<svg viewBox="0 0 320 380" xmlns="http://www.w3.org/2000/svg">
  <!-- Gehirn / Hirnstamm -->
  <ellipse cx="160" cy="42" rx="46" ry="32" fill="#EDE9DD" stroke="#544013" stroke-width="3"/>
  <text x="160" y="38" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#544013" font-weight="bold">Gehirn /</text>
  <text x="160" y="53" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#544013" font-weight="bold">Hirnstamm</text>
  <rect x="153" y="73" width="14" height="16" rx="4" fill="#544013"/>

  <!-- Vagusnerv - gestrichelte Mittellinie -->
  <line x1="160" y1="89" x2="160" y2="345" stroke="#C85A14" stroke-width="3.5" stroke-dasharray="8,5"/>

  <!-- Kehlkopf -->
  <circle cx="160" cy="116" r="11" fill="#C85A14"/>
  <line x1="173" y1="116" x2="212" y2="116" stroke="#544013" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="216" y="120" font-family="Arial,sans-serif" font-size="12" fill="#544013">Kehlkopf</text>

  <!-- Herz -->
  <path d="M160 180 C160 180 136 165 136 150 C136 139 144 132 153 132 C157 132 160 136 160 136 C160 136 163 132 167 132 C176 132 184 139 184 150 C184 165 160 180 160 180Z"
        fill="#C85A14"/>
  <line x1="184" y1="156" x2="212" y2="156" stroke="#544013" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="216" y="160" font-family="Arial,sans-serif" font-size="12" fill="#544013">Herz</text>

  <!-- Lunge links -->
  <ellipse cx="124" cy="200" rx="27" ry="33" fill="#EDE9DD" stroke="#544013" stroke-width="2"/>
  <!-- Lunge rechts -->
  <ellipse cx="196" cy="200" rx="27" ry="33" fill="#EDE9DD" stroke="#544013" stroke-width="2"/>
  <text x="160" y="203" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#544013">Lunge</text>
  <line x1="196" y1="168" x2="212" y2="172" stroke="#544013" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="216" y="176" font-family="Arial,sans-serif" font-size="12" fill="#544013">Lunge</text>

  <!-- Zwerchfell -->
  <path d="M90 238 Q124 254 160 250 Q196 254 230 238" stroke="#544013" stroke-width="4" fill="none" stroke-linecap="round"/>
  <line x1="230" y1="238" x2="212" y2="248" stroke="#544013" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="216" y="262" font-family="Arial,sans-serif" font-size="12" fill="#544013">Zwerchfell</text>

  <!-- Bauch -->
  <ellipse cx="160" cy="304" rx="48" ry="30" fill="#EDE9DD" stroke="#544013" stroke-width="2"/>
  <text x="160" y="308" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#544013">Bauch</text>

  <!-- Vagusnerv Label unten -->
  <text x="160" y="366" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#C85A14" font-weight="bold">— Vagusnerv —</text>

  <!-- Sympathikus Box links -->
  <rect x="4" y="100" width="84" height="42" rx="7" fill="#C85A14" opacity=".18"/>
  <text x="46" y="117" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#1a1506" font-weight="bold">Sympathikus</text>
  <text x="46" y="133" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#C85A14" font-weight="bold">«Gaspedal» 🚀</text>

  <!-- Parasympathikus Box links -->
  <rect x="4" y="258" width="84" height="42" rx="7" fill="#544013" opacity=".13"/>
  <text x="46" y="274" text-anchor="middle" font-family="Arial,sans-serif" font-size="10.5" fill="#1a1506" font-weight="bold">Parasympath.</text>
  <text x="46" y="291" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#544013" font-weight="bold">«Bremse» 🛑</text>
</svg>
