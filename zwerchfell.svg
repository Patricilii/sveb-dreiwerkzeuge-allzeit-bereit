<svg viewBox="0 0 310 295" xmlns="http://www.w3.org/2000/svg">
  <!-- Körperumriss -->
  <ellipse cx="120" cy="148" rx="88" ry="122" fill="none" stroke="#544013" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Lungen -->
  <ellipse cx="88" cy="110" rx="33" ry="44" fill="#EDE9DD" stroke="#544013" stroke-width="2"/>
  <ellipse cx="152" cy="110" rx="33" ry="44" fill="#EDE9DD" stroke="#544013" stroke-width="2"/>
  <text x="120" y="113" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#544013" font-weight="bold">Lungen</text>

  <!-- Zwerchfell HOCH = Ausatmung (solide, orange) -->
  <path d="M36 158 Q76 140 120 146 Q164 140 204 158" stroke="#C85A14" stroke-width="5.5" fill="none" stroke-linecap="round"/>

  <!-- Zwerchfell TIEF = Einatmung (gestrichelt, braun) -->
  <path d="M36 182 Q76 198 120 193 Q164 198 204 182" stroke="#544013" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-dasharray="8,5"/>

  <!-- Doppelpfeil Bewegungsbereich -->
  <line x1="28" y1="158" x2="28" y2="182" stroke="#544013" stroke-width="2.5"/>
  <polygon points="28,153 24,163 32,163" fill="#544013"/>
  <polygon points="28,187 24,177 32,177" fill="#544013"/>

  <!-- Labels Ausatmung -->
  <text x="212" y="150" font-family="Arial,sans-serif" font-size="10" fill="#C85A14" font-weight="bold">↑ Ausatmung</text>
  <text x="212" y="163" font-family="Arial,sans-serif" font-size="9.5" fill="#544013">Parasympath.</text>

  <!-- Labels Einatmung -->
  <text x="212" y="184" font-family="Arial,sans-serif" font-size="10" fill="#544013" font-weight="bold">↓ Einatmung</text>
  <text x="212" y="197" font-family="Arial,sans-serif" font-size="9.5" fill="#544013">Sympathikus</text>

  <!-- Bauchorgane -->
  <ellipse cx="96" cy="228" rx="30" ry="19" fill="#EDE9DD" stroke="#544013" stroke-width="1.5"/>
  <ellipse cx="144" cy="232" rx="26" ry="16" fill="#EDE9DD" stroke="#544013" stroke-width="1.5"/>
  <text x="120" y="234" text-anchor="middle" font-family="Arial,sans-serif" font-size="9.5" fill="#544013">Bauchorgane</text>

  <!-- Legende -->
  <line x1="14" y1="262" x2="48" y2="262" stroke="#C85A14" stroke-width="4.5" stroke-linecap="round"/>
  <text x="55" y="266" font-family="Arial,sans-serif" font-size="9.5" fill="#C85A14">Ausatmung (hoch)</text>
  <line x1="14" y1="279" x2="48" y2="279" stroke="#544013" stroke-width="3" stroke-dasharray="6,4"/>
  <text x="55" y="283" font-family="Arial,sans-serif" font-size="9.5" fill="#544013">Einatmung (tief)</text>
</svg>
